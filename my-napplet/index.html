<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highlights</title>
  </head>
  <body>
    <main id="app" class="stage">
      <header class="chrome">
        <p class="brand">Highlights</p>
        <p class="meta" id="meta">kind 9802</p>
      </header>

      <section
        id="carousel"
        class="carousel"
        aria-roledescription="carousel"
        aria-label="Recent Nostr highlights"
        aria-live="polite"
      >
        <p class="state" id="state">Gathering highlights…</p>
      </section>

      <div id="progress" class="progress" hidden aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <ol id="dots" class="dots" hidden aria-hidden="true"></ol>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
