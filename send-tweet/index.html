<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="napplet-allow-standalone" />
    <title>Send Tweet</title>
  </head>
  <body>
    <main>
      <div class="composer">
        <label class="sr-only" for="note">Tweet</label>
        <textarea
          id="note"
          name="note"
          rows="7"
          placeholder="What's happening?"
          required
          autofocus
        ></textarea>
        <div class="actions">
          <output id="status" aria-live="polite"></output>
          <button id="send" type="button" aria-live="polite">send tweet</button>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
